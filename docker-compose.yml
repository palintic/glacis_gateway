services:
  postgres:
    image: postgres:16-alpine
    container_name: glacis-postgres
    environment:
      POSTGRES_USER: glacis
      POSTGRES_PASSWORD: glacispassword
      POSTGRES_DB: glacis_gateway
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glacis -d glacis_gateway"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: glacis-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: glacis-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql+asyncpg://glacis:glacispassword@postgres:5432/glacis_gateway
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ENVIRONMENT=development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: glacis-worker
    entrypoint: []
    command: ["python", "-m", "arq", "app.workers.tasks.WorkerSettings"]
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql+asyncpg://glacis:glacispassword@postgres:5432/glacis_gateway
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ENVIRONMENT=development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
